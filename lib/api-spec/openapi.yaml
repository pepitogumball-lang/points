openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: points
    description: Points operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /points:
    get:
      operationId: getPoints
      tags: [points]
      summary: Get current points
      responses:
        "200":
          description: Current points value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointsResponse"
    post:
      operationId: setPoints
      tags: [points]
      summary: Set points (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PointsInput"
      responses:
        "200":
          description: Updated points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    PointsResponse:
      type: object
      properties:
        points:
          type: integer
      required:
        - points
    PointsInput:
      type: object
      properties:
        points:
          type: integer
      required:
        - points
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
